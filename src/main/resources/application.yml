spring:
  config:
    import: "optional:file:.env[.properties]"
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: sia
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java
    livereload:
      enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      location: ${java.io.tmpdir}

server:
  port: 2026

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:86400000}
  super-admin:
    correo: ${SUPER_ADMIN_EMAIL}
    contrasena: ${SUPER_ADMIN_PASSWORD}
    nombres: ${SUPER_ADMIN_NOMBRES:Super}
    apellidos: ${SUPER_ADMIN_APELLIDOS:Admin}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000,https://d32gr4vkubb6g5.cloudfront.net}
  aws:
    s3:
      bucket: ${S3_BUCKET:sia-archivos}
      region: ${AWS_REGION:us-east-1}
      presigned-url-expiration-minutes: ${S3_PRESIGNED_URL_EXPIRATION_MINUTES:60}
